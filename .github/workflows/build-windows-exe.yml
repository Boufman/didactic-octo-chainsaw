name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyperclip flask flask_cors

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Assessment2A" assessment_app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Assessment2A-windows-exe
          path: dist/Assessment2A.exe
